name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      # gate:correctness builds, then runs eslint + typecheck and fails only
      # on violations beyond the frozen `.sandcastle/gate-baseline.json`
      # allowlist (swap#77). Replaces the old soft-gated `pnpm lint
      # continue-on-error: true` (a false-PASS hole — lint errors could never
      # fail CI) and adds typecheck to CI for the first time (previously
      # absent entirely).
      - run: pnpm run gate:correctness

      # Root `pnpm test` (not `pnpm -r test`) so the run picks up
      # vitest.config.ts's canonical include list, which covers both
      # packages/*/src/**/*.test.ts and .sandcastle/scripts/**/*.test.ts —
      # `pnpm -r test` would resolve packages/swap's own vitest.config.ts
      # instead and silently skip the .sandcastle gate-lib tests.
      - run: pnpm test

  devbox-validate:
    name: Devbox Environment Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Assert tool versions
        run: |
          cat > "${RUNNER_TEMP:-/tmp}/assert-versions.sh" <<'ASSERT'
          set -euo pipefail
          node --version | grep -E '^v22\.'
          pnpm --version | grep -E '^8\.15\.'
          forge --version
          cast --version
          anvil --version
          ASSERT
          devbox run -- bash "${RUNNER_TEMP:-/tmp}/assert-versions.sh"
          echo "✅ All devbox tools resolved at expected versions"

      - name: Smoke build
        run: devbox run -- bash -c "pnpm install --no-frozen-lockfile && pnpm build"

      # Devbox pins foundry, so `anvil` is on PATH here — this is where the
      # anvil-gated integration suite (incl. the swap#50 rolling-settlement
      # e2e, which spawns its own two anvil chains) actually RUNS instead of
      # runtime-skipping like it does on the plain build job.
      - name: Integration tests (anvil-gated)
        run: devbox run -- bash -c "pnpm --filter @toon-protocol/swap test:integration"
