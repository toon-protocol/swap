name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm lint
        continue-on-error: true

      - run: pnpm -r build

      - run: pnpm -r test --if-present

  devbox-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write          # commit devbox.lock back to the PR branch
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: jetify-com/devbox-install-action@734088efddca47cf44ff8a09289c6d0e51b73218  # v0.12.0
        with:
          enable-cache: true
      - name: Resolve and pin devbox.lock
        run: devbox install
      - name: Commit devbox.lock if it changed
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if ! git diff --quiet -- devbox.lock; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add devbox.lock
            git commit -m "ci: pin devbox.lock"
            git push origin HEAD:"$HEAD_REF"
          fi
