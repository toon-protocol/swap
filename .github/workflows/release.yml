name: Release

# Publishes @toon-protocol/core and @toon-protocol/sdk to npm via changesets.
# Auth comes from the org-level NPM_TOKEN secret (no local `npm login`).
# changesets rewrites `workspace:*` -> the real version at publish time.

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - run: devbox run -- pnpm install --no-frozen-lockfile

      - run: devbox run -- pnpm -r build

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
